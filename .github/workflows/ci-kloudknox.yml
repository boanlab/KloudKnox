name: ci-kloudknox

on:
  push:
    branches: [main]
    paths:
      - 'KloudKnox/**'
      - 'protobuf/**'
      - 'Dockerfile'
      - '.github/workflows/ci-kloudknox.yml'
      - '.github/workflows/ci-kloudknox-bypass.yml'
  pull_request:
    branches: [main]
    paths:
      - 'KloudKnox/**'
      - 'protobuf/**'
      - 'Dockerfile'
      - '.github/workflows/ci-kloudknox.yml'
      - '.github/workflows/ci-kloudknox-bypass.yml'

jobs:
  go-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Check go-fmt
        run: make gofmt
        working-directory: KloudKnox

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run golangci-lint
        run: make golangci-lint
        working-directory: KloudKnox

  go-sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run Gosec Security Scanner
        run: make gosec
        working-directory: KloudKnox

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run unit tests
        run: make test
        working-directory: KloudKnox

  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build KloudKnox Image
        working-directory: KloudKnox
        run: make build-image
