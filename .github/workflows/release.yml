name: release

on:
  push:
    tags: ['v*']

jobs:
  kloudknox-go-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Check go-fmt
        run: make gofmt
        working-directory: KloudKnox

  kloudknox-go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run golangci-lint
        run: make golangci-lint
        working-directory: KloudKnox

  kloudknox-go-sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run Gosec Security Scanner
        run: make gosec
        working-directory: KloudKnox

  kloudknox-go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run unit tests
        run: make test
        working-directory: KloudKnox

  operator-go-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Check go-fmt
        run: make gofmt
        working-directory: operator-controller

  operator-go-sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run Gosec Security Scanner
        run: make gosec
        working-directory: operator-controller

  operator-go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run unit tests
        run: make test
        working-directory: operator-controller

  push-images:
    needs:
      - kloudknox-go-fmt
      - kloudknox-go-lint
      - kloudknox-go-sec
      - kloudknox-go-test
      - operator-go-fmt
      - operator-go-sec
      - operator-go-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push KloudKnox image
        working-directory: KloudKnox
        run: make TAG=${{ github.ref_name }} push-image
      - name: Push operator-controller image
        working-directory: operator-controller
        run: make TAG=${{ github.ref_name }} push-image
