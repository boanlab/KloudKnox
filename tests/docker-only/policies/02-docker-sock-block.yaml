# Scenario 2 (features.md §30.2): block /var/run/docker.sock from every
# test target. Uses applyToAll=true — §27 regression as well.
# Expected: `docker exec e2e-alpine cat /var/run/docker.sock` → EPERM + alert.
apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: e2e-docker-sock-block
  namespace: docker
spec:
  applyToAll: true
  file:
    - path: /var/run/docker.sock
      action: Block
    - path: /run/docker.sock
      action: Block
  action: Audit
