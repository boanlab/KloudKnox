apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-1-net-peer-egress-allow
spec:
  selector:
    container: ubuntu-1
  network:
    - direction: egress
      selector:
        container: ubuntu-2
    - direction: egress
      ipBlock:
        cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
  action: Allow

