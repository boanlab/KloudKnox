apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-1-file-path-block
spec:
  selector:
    container: ubuntu-1
  file:
    - path: /etc/passwd
    - path: /secret.txt
    - path: /credentials/password
  action: Block

# test
# $ cat /etc/passwd
# cat: /etc/passwd: Permission denied
# echo "test" >> /secret.txt
# bash: /secret.txt: Permission denied
# echo "test" >> /credentials/password
# bash: /credentials/password: Permission denied
