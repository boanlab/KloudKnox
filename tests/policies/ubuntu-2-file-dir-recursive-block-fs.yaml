apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-2-file-dir-recursive-block-fs
spec:
  selector:
    container: ubuntu-2
  file:
    - dir: /credentials/
      recursive: true
      fromSource:
      - path: /bin/cat
      - path: /usr/bin/cat
  action: Block

# test
# $ cat /credentials/password
# cat: /credentials/password: Permission denied
# $ cat /credentials/keys/priv.key
# cat: /credentials/keys/priv.key: Permission denied
