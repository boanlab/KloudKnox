apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-2-file-dir-recursive-block
spec:
  selector:
    container: ubuntu-2
  file:
    - dir: /run/secrets/kubernetes.io/serviceaccount/
      recursive: true
  action: Block

