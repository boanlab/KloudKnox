apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-3-proc-dir-allow
spec:
  selector:
    container: ubuntu-3
  process:
    - dir: /bin/
    - dir: /usr/bin/
  file:
    - dir: /credentials/
      recursive: true
  action: Allow

# test
# $ cat /credentials/password
# password file
# $ cat /etc/hostname
# cat: /etc/hostname: Permission denied
