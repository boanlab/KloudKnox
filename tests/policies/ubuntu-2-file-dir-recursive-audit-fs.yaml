apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-2-file-dir-recursive-audit-fs
spec:
  selector:
    container: ubuntu-2
  file:
    - dir: /credentials/
      recursive: true
      fromSource:
      - path: /bin/cat
      - path: /usr/bin/cat
  action: Audit

# test
# $ cat /credentials/password
# password file (audit)
# $ cat /credentials/keys/priv.key
# key file (audit)
# $ head /credentials/password
# password file (no log)
# $ head /credentials/keys/priv.key
# key file (no log)
