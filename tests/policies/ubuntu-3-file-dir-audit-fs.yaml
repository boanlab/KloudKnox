apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-3-file-dir-audit-fs
spec:
  selector:
    container: ubuntu-3
  file:
    - dir: /credentials/
      fromSource:
      - path: /bin/cat
      - path: /usr/bin/cat
  action: Audit

# test
# $ cat /credentials/password
# password file (audit)
# $ cat /etc/hostname
# <ubuntu-3 pod hostname> (no log)
