apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-3-proc-dir-block
spec:
  selector:
    container: ubuntu-3
  process:
    - dir: /sbin/
    - dir: /usr/sbin/
  action: Block

