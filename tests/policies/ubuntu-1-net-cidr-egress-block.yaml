apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-1-net-cidr-egress-block
spec:
  selector:
    container: ubuntu-1
  network:
    - direction: egress
      ipBlock:
        cidr: 8.8.4.0/24
  action: Block

# test
# $ dig @8.8.4.4 google.com
# ;; communications error to 8.8.4.4#53: timed out
# ;; no servers could be reached
#
# $ dig @8.8.8.8 google.com
# ;; ANSWER SECTION:
# google.com.   A   142.250.xxx.xxx
