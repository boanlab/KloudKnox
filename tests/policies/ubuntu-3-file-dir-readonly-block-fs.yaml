apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-3-file-dir-readonly-block-fs
spec:
  selector:
    container: ubuntu-3
  file:
    - dir: /credentials/
      readOnly: true
      fromSource:
      - path: /readwrite
  action: Block

# test
# $ ./readwrite -r /credentials/password
# p
# $ ./readwrite -w /credentials/password
# Error! (permission denied)
