apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: group-2-file-path-allow-fs
spec:
  selector:
    group: group-2
  file:
    - path: /secret.txt
      fromSource:
      - path: /bin/cat
      - path: /usr/bin/cat
  action: Allow

# test
# $ cat /secret.txt
# secret file
# $ cat /etc/hostname
# cat: /etc/hostname: Permission denied
