apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-3-proc-path-allow
spec:
  selector:
    container: ubuntu-3
  process:
    - path: /bin/cat
    - path: /usr/bin/cat
  action: Allow

# test
# $ cat /etc/hostname             # /bin/cat whitelisted
# <ubuntu-3 pod hostname>
# $ ls /                           # /bin/ls not whitelisted → block
# bash: /bin/ls: Permission denied
