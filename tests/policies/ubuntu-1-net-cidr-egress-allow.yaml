apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-1-net-cidr-egress-allow
spec:
  selector:
    container: ubuntu-1
  network:
    - direction: egress
      ipBlock:
        cidr: 8.8.4.0/24
  action: Allow

# test
# $ dig @8.8.4.4 google.com
# ;; ANSWER SECTION:
# google.com.   A   142.250.xxx.xxx
#
# $ dig @8.8.8.8 google.com
