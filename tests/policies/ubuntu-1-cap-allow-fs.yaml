apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-1-cap-allow-fs
spec:
  selector:
    container: ubuntu-1
  capability:
    - name: CAP_NET_RAW
      fromSource:
        - path: /usr/local/bin/kk-capraw
      action: Allow
  action: Block

# test
# $ /usr/local/bin/kk-capraw                    # opens AF_INET/SOCK_RAW/ICMP
#   (exits 0)
#
# $ ping -c 1 127.0.0.1                         # not in fromSource whitelist
# ping: socket: Operation not permitted
