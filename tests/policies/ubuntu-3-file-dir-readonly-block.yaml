apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-3-file-dir-readonly-block
spec:
  selector:
    container: ubuntu-3
  file:
    - dir: /credentials/
      readOnly: true
  action: Block

# test
# $ cat /credentials/password
# password file
# $ echo "password" > /credentials/password
# bash: /credentials/password: Permission denied
