apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-1-net-peer-egress-block
spec:
  selector:
    container: ubuntu-1
  network:
    - direction: egress
      selector:
        container: ubuntu-2
  action: Block

