apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-1-net-fqdn-egress-allow
spec:
  selector:
    container: ubuntu-1
  network:
    - direction: egress
      fqdn: google.com
    - direction: egress
      ipBlock:
        cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
  action: Allow

# test
# $ curl -sI https://google.com | head -1
# HTTP/2 200 / HTTP/2 301
#
# $ curl -sI https://example.com
# curl: (6) Could not resolve host / (7) Failed to connect
