apiVersion: security.boanlab.com/v1
kind: KloudKnoxPolicy
metadata:
  name: ubuntu-3-file-dir-allow
spec:
  selector:
    container: ubuntu-3
  process:
    - dir: /bin/
    - dir: /usr/bin/
  file:
    - dir: /credentials/
  action: Allow

# test
# $ cat /credentials/password
# password file
# $ cat /etc/hostname              # outside /credentials/ → block
# cat: /etc/hostname: Permission denied
