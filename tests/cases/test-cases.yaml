# Capability

- id: test-54
  name: ubuntu-1 cap-block
  policy: policies/ubuntu-1-cap-block.yaml
  steps:
    - pod: ubuntu-1
      exec: "ping -c 1 -W 2 127.0.0.1"
      expect: blocked
    - pod: ubuntu-1
      exec: "iptables -L INPUT -n"
      expect: blocked
    - pod: ubuntu-1
      exec: "cat /etc/hostname"
      expect: allowed

- id: test-55
  name: ubuntu-1 cap-allow-fs
  policy: policies/ubuntu-1-cap-allow-fs.yaml
  steps:
    - pod: ubuntu-1
      exec: "ping -c 1 -W 2 127.0.0.1"
      expect: blocked
    - pod: ubuntu-1
      exec: "/usr/local/bin/kk-capraw"
      expect: allowed

# IPC

- id: test-56
  name: ubuntu-1 ipc-signal-allow-fs
  policy: policies/ubuntu-1-ipc-signal-allow-fs.yaml
  steps:
    - pod: ubuntu-1
      exec: "sleep 5 & pid=$!; sleep 0.3; kill -KILL $pid 2>/dev/null; wait $pid 2>/dev/null; true"
      expect: blocked
    - pod: ubuntu-1
      exec: "sleep 5 & pid=$!; sleep 0.3; /usr/local/bin/kk-signaler $pid 15; wait $pid 2>/dev/null; true"
      expect: allowed
    - pod: ubuntu-1
      exec: "cat /etc/hostname"
      expect: allowed

- id: test-57
  name: ubuntu-1 ipc-ptrace-audit
  policy: policies/ubuntu-1-ipc-ptrace-audit.yaml
  steps:
    - pod: ubuntu-1
      exec: "strace -o /dev/null /bin/true"
      expect: audited

