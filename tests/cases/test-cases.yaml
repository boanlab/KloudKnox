# Network

- id: test-36
  name: ubuntu-1 net-cidr-egress-allow
  policy: policies/ubuntu-1-net-cidr-egress-allow.yaml
  tags: [external-network]
  steps:
    - pod: ubuntu-1
      exec: "dig @8.8.4.4 google.com"
      expect: allowed
      timeout: 10
    - pod: ubuntu-1
      exec: "dig @8.8.8.8 google.com"
      expect: blocked
      timeout: 10

- id: test-37
