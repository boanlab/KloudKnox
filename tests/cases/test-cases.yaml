# KloudKnox E2E test cases.
# Schema: see lib/cases.py.
# Grouped by resource category: process → file → network → capability → ipc → combined.
# Within each section, ordered alphabetically by policy filename.

# Process

- id: test-01
  name: group-1 proc-path-allow-fs
  policy: policies/group-1-proc-path-allow-fs.yaml
  steps:
    - pod: ubuntu-1
      exec: "dash -c ls"
      expect: allowed
    - pod: ubuntu-1
      exec: "ls /"
      expect: blocked

- id: test-02
  name: group-1 proc-path-block
  policy: policies/group-1-proc-path-block.yaml
  steps:
    - pod: ubuntu-1
      exec: "sleep 1"
      expect: blocked
    - pod: ubuntu-2
      exec: "sleep 1"
      expect: blocked

- id: test-03
  name: group-1 proc-path-block-fs
  policy: policies/group-1-proc-path-block-fs.yaml
  steps:
    - pod: ubuntu-1
      exec: "dash -c ls"
      expect: blocked
    - pod: ubuntu-1
      exec: "dash -c 'cat /etc/hostname'"
      expect: allowed
    - pod: ubuntu-2
      exec: "dash -c ls"
      expect: blocked

- id: test-04
  name: group-2 proc-path-audit
  policy: policies/group-2-proc-path-audit.yaml
  steps:
    - pod: ubuntu-3
      exec: "sleep 1"
      expect: audited
    - pod: ubuntu-3
      exec: "cat /etc/hostname"
      expect: allowed
    - pod: ubuntu-4
      exec: "sleep 1"
      expect: audited

- id: test-05
  name: ubuntu-1 proc-dir-block
